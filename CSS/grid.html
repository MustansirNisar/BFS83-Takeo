<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .container{
            width: 600px;
            height: 500px;
            border: 2px solid black;
            background-color: aqua;
            display: grid;
            /* grid-auto-flow: column; */
            /* grid-template-columns: 1fr 2fr 3fr; */
            /* grid-template-rows:100px 200px 100px; */
            /* row-gap: 5px;
            column-gap: 5px; */
            /* gap: 5px; */
        }
        .container>.items{
            background-color: brown;
            border: 2px solid black;
            margin: 5px;
        }
        #item2{
            /* grid-row-start:1 ;
            grid-row-end:2 ; */
            /* grid-row: 1/2; */
            /* grid-column-start: 2;
            grid-column-end: 4; */
            /* grid-column:2/4 ; */
            grid-area:1/2/2/4 ;
        }
        #item3{
            /* grid-row-start:2 ;
            grid-row-end:3 ; */
            /* grid-row: 2/3; */
            /* grid-column-start:1 ;
            grid-column-end:3 ; */
            /* grid-column: 1/3; */
            grid-area:2/1/3/3 ;
        }
        #item5{
            /* grid-row-start:3 ;
            grid-row-end:4 ; */
            /* grid-row:3/4 ; */
            /* grid-column-start:1 ;
            grid-column-end:4 ; */
            /* grid-column:1/4 ; */
            grid-area:3/1/4/4 ;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="items" id="item1">Item1</div>
        <div class="items" id="item2">Item2</div>
        <div class="items" id="item3">Item3</div>
        <div class="items" id="item4">Item4</div>
        <div class="items" id="item5">Item5</div>
        <!-- <div class="items" id="item6">Item6</div>
        <div class="items" id="item7">Item7</div>

</html>
