<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Sizing</title>
    <style>
        *{
            box-sizing: border-box;
        }
        div{
            height: 200px;
            width: 200px;
            background-color: brown;
            border: 4px solid orange;
            margin-bottom: 30px;
        }
        #d1{
            padding: 30px;
        }
    #d2{
        padding: 30px;
        box-sizing: border-box;
    }
    </style>
</head>
<body>
    <div id="d1"></div>
    <div id="d2">Hello</div>
</body>
</html>
