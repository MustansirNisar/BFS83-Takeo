<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Units</title>
    <style>
        #outer{
            background-color: aqua;
            width: 50%;
            height: 200px;
        }
        #inner{
            background-color: brown;
            width: 50%;
            height: 50%;
        }
        #greeting{
            width: 50%;
            font-size: 50%;
        }
    </style>
</head>
<body>
    <h1>Welcome to the universe of Relative Units</h1>
    <h4>How are you feeling?</h4>

    <div id="outer">
        <div id="inner">
            <h1 id="greeting">Hello</h1>
        </div>
    </div>
</body>
</html>
